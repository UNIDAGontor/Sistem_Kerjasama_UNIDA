<!-- ============================= -->
<!-- CARD 1 -->
<!-- ============================= -->
<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 sm:p-6 mt-6">

  <!-- HEADER -->
  <div class="flex flex-col gap-4 mb-5">

    <h2 class="text-base sm:text-lg font-semibold text-gray-800 leading-snug flex items-start gap-2">
      <span class="text-lg sm:text-xl mt-0.5">📊</span>
      <span>
        Jumlah Kegiatan Berdasarkan Prodi (PJ)
      </span>
    </h2>

    <!-- FILTER -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full">
      <select id="filterTahun"
        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm bg-white
               focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
        <option value="all">Semua Tahun</option>
      </select>

      <select id="filterFakultas"
        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm bg-white
               focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
        <option value="all">Semua Fakultas</option>
      </select>
    </div>

  </div>

  <!-- CHART -->
  <div class="w-full overflow-x-auto">
    <div class="min-w-[500px] sm:min-w-0">
      <canvas id="chartProdi" height="130"></canvas>
    </div>
  </div>

</div>

<!-- ============================= -->
<!-- CARD 2 -->
<!-- ============================= -->
<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 sm:p-6 mt-6">

  <h2 class="text-base sm:text-lg font-semibold text-gray-800 leading-snug flex items-start gap-2 mb-5">
    <span class="text-lg sm:text-xl mt-0.5">📈</span>
    <span>
      Perkembangan Kegiatan Berdasarkan Jenis Dokumen
    </span>
  </h2>

  <div class="w-full overflow-x-auto">
    <div class="min-w-[500px] sm:min-w-0">
      <canvas id="chartJenisDokumen" height="130"></canvas>
    </div>
  </div>

</div>
