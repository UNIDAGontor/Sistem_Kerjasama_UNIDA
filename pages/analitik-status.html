<div class="p-4 sm:p-6 space-y-6">
  <!-- HEADER -->
  <div>
    <h1 class="text-lg sm:text-xl font-semibold">Dashboard Status Kerjasama</h1>
    <p class="text-xs sm:text-sm text-gray-500">
      Analitik & monitoring kerjasama
    </p>
  </div>

  <!-- GRID -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6">
    <!-- KALENDER -->
    <div class="lg:col-span-2 bg-white rounded-xl shadow p-4">
      <h2
        class="font-semibold mb-3 flex items-center gap-2 text-sm sm:text-base"
      >
        📅 Kalender Kerjasama
      </h2>
      <div id="kalenderKerjasama" class="min-h-[420px] sm:min-h-[520px]"></div>
    </div>

    <!-- DONUT STATUS -->
    <div class="bg-white rounded-xl shadow p-4">
      <h2 class="font-semibold mb-3 text-sm sm:text-base">
        📄 MoU vs MoA vs IA
      </h2>

      <div class="relative w-full h-[300px]">
        <canvas id="chartStatusDokumen" class="!w-full !h-full"></canvas>
      </div>

      <!-- DETAIL -->
      <div
        id="chart-detail"
        class="mt-4 p-3 border rounded-lg text-xs sm:text-sm hidden bg-gray-50"
      ></div>
    </div>
  </div>

  <!-- BAR SEBARAN -->
  <div class="bg-white rounded-xl shadow p-4">
    <!-- HEADER CARD -->
    <div
      class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4"
    >
      <h2 class="font-semibold text-sm sm:text-base">📊 Sebaran Dokumen</h2>

      <!-- FILTER STATUS -->
      <div class="flex flex-wrap gap-2">
        <button
          data-status-filter="all"
          onclick="setStatusFilter('all')"
          class="px-3 py-1 rounded bg-gray-200 text-xs sm:text-sm"
        >
          Semua
        </button>

        <button
          data-status-filter="Aktif"
          onclick="setStatusFilter('Aktif')"
          class="px-3 py-1 rounded bg-green-500 text-white text-xs sm:text-sm"
        >
          Aktif
        </button>

        <button
          data-status-filter="Tidak Aktif"
          onclick="setStatusFilter('Tidak Aktif')"
          class="px-3 py-1 rounded bg-red-500 text-white text-xs sm:text-sm"
        >
          Tidak Aktif
        </button>
      </div>
    </div>

    <!-- CHART -->
    <div class="relative w-full h-[300px] sm:h-[380px]">
      <canvas id="chartSebaranDokumen" class="!w-full !h-full"></canvas>
    </div>
  </div>

  <!-- TABEL -->
  <div class="bg-white rounded-xl shadow p-4">
    <h2 class="font-semibold mb-3 text-sm sm:text-base">📋 Daftar Kerjasama</h2>

    <div class="overflow-x-auto">
      <table class="min-w-[600px] w-full text-xs sm:text-sm border">
        <thead class="bg-gray-100">
          <tr>
            <th class="border px-3 py-2">No</th>
            <th class="border px-3 py-2">Judul</th>
            <th class="border px-3 py-2">Jenis</th>
            <th class="border px-3 py-2">Tanggal</th>
            <th class="border px-3 py-2">Status</th>
          </tr>
        </thead>
        <tbody id="statusKerjasamaBody">
          <tr>
            <td colspan="5" class="text-center py-6 text-gray-400">
              Memuat data...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
