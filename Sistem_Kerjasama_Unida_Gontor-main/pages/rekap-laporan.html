<div class="p-4 md:p-6 space-y-6">
  <!-- HEADER -->
  <div
    class="flex flex-col md:flex-row md:items-center md:justify-between gap-3"
  >
    <h2 class="text-xl font-semibold">📊 Rekapitulasi Laporan</h2>

    <input
      type="text"
      id="search-rekap"
      placeholder="Cari laporan..."
      onkeyup="renderRekapTable()"
      class="w-full md:w-64 border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-purple-500 focus:outline-none"
    />
  </div>

  <!-- TABLE -->
  <div class="bg-white rounded-2xl shadow overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-[950px] w-full text-sm">
        <thead class="bg-gray-100 text-xs uppercase text-gray-600">
          <tr>
            <th class="p-3 text-left">PJ</th>
            <th class="p-3 text-left">Bidang</th>
            <th class="p-3 text-left">Bentuk</th>
            <th class="p-3 text-left">Tingkat</th>
            <th class="p-3 text-left">Tanggal</th>
            <th class="p-3 text-left">Mitra</th>
            <th class="p-3 text-left">Status</th>
            <th class="p-3 text-left">Cek Laporan</th>
            <th class="p-3 text-center sticky right-0 bg-gray-100">Aksi</th>
          </tr>
        </thead>

        <tbody id="rekap-body" class="divide-y"></tbody>
      </table>
    </div>

    <!-- PAGINATION -->
    <div
      class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 text-xs sm:text-sm mt-4"
    >
      <span id="rekap-info" class="text-gray-600"></span>

      <div class="w-full sm:w-auto overflow-x-auto">
        <div id="rekap-pagination" class="flex gap-1 min-w-max"></div>
      </div>
    </div>
  </div>

  <!-- MODAL DETAIL -->
  <div
    id="rekap-detail-modal"
    class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 px-4"
  >
    <div
      class="bg-white max-w-4xl w-full rounded-2xl shadow-xl max-h-[90vh] flex flex-col"
    >
      <div class="p-6 pb-4 border-b">
        <h3 class="text-lg font-semibold">Detail Kegiatan & Laporan</h3>
      </div>

      <div
        id="rekap-detail-content"
        class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm overflow-y-auto p-6 flex-1"
      ></div>

      <!-- FOOTER -->
      <div
        class="flex flex-col sm:flex-row justify-end gap-3 p-4 border-t bg-white"
      >
        <button
          onclick="closeRekapDetail()"
          class="px-4 py-2 border rounded-lg hover:bg-gray-100 transition"
        >
          Tutup
        </button>

        <button
          onclick="editRekapFull()"
          class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg transition"
        >
          Edit
        </button>
      </div>
    </div>
  </div>
</div>
