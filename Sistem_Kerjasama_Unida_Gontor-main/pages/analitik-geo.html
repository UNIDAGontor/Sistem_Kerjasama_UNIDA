<div class="p-4 sm:p-6 space-y-6">

  <!-- TITLE -->
  <div>
    <h2 class="text-lg sm:text-xl font-semibold text-gray-800 flex items-center gap-2">
      <span class="text-xl">🌍</span>
      Geo Mitra (Sebaran Negara)
    </h2>
  </div>

  <!-- MAP + TOTAL -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">

    <!-- MAP CARD -->
    <div class="lg:col-span-2">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-3 sm:p-4">

        <div class="w-full h-[320px] sm:h-[420px] rounded-xl overflow-hidden">
          <div id="map" class="w-full h-full"></div>
        </div>

      </div>
    </div>

    <!-- TOTAL CARD -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col justify-center items-center">

      <div class="text-xs sm:text-sm text-gray-500 mb-2">
        Total Negara Mitra
      </div>

      <div id="totalNegara"
        class="text-3xl sm:text-4xl font-bold text-emerald-600 tracking-tight">
        0
      </div>

    </div>

  </div>

  <!-- TABLE CARD -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 sm:p-6">

    <h3 class="font-semibold text-base sm:text-lg mb-4">
      Top Negara Mitra
    </h3>

    <div class="overflow-x-auto">
      <table class="min-w-[600px] w-full text-xs sm:text-sm">
        <thead class="text-gray-500 border-b bg-gray-50">
          <tr>
            <th class="py-2 text-left w-10">No</th>
            <th class="py-2 text-left">Negara</th>
            <th class="py-2 text-right">MoU</th>
            <th class="py-2 text-right">MoA</th>
            <th class="py-2 text-right">IA</th>
            <th class="py-2 text-right font-semibold">Total</th>
          </tr>
        </thead>
        <tbody id="topNegaraBody"></tbody>
      </table>
    </div>

    <!-- PAGINATION -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mt-4">

  <div id="geo-pagination-info" class="text-xs text-gray-500">
    Menampilkan 0 data
  </div>

  <div class="w-full sm:w-auto overflow-x-auto">
    <div id="geo-pagination" class="flex gap-2 min-w-max">
    </div>
  </div>

</div>
  </div>

</div>
